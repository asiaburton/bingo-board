<div class="c-bb-block-group" [class.c-bb-block-group--horizontal]="horizontal">
  <div class="c-bb-block-group__category">{{ category }}</div>
  <ol class="c-bb-block-group__blocks">
    <li *ngFor="let item of items" class="c-bb-block-group__block-container">
      <app-block
        [item]="item"
        [isCalled]="isCalled(item.id)"
        [isLastCalled]="isLastCalled(item.id)"
        (itemClick)="onItemClick($event)"
      ></app-block>
    </li>
  </ol>
</div>
