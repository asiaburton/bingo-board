<button
  type="button"
  class="c-bb-block"
  [class.c-bb-block--called]="isCalled"
  [class.c-bb-block--last-called]="isLastCalled"
  [attr.title]="item?.definition || null"
  (click)="onBlockClick()"
>
  {{ item?.label }}
  <span class="c-bb-block__tooltip" *ngIf="item?.definition" aria-hidden="true">{{ item?.definition }}</span>
</button>
